<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARENASYNC - STADIUM DB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#0f0f1a;--surface2:#13131f;--surface3:#1a1a2e;
  --border:#1e1e2e;--border2:#2d2d40;
  --accent:#c084fc;--accent2:#6366f1;--accent3:#818cf8;
  --green:#4ade80;--red:#ef4444;--amber:#fbbf24;--orange:#f97316;--blue:#60a5fa;--pink:#f472b6;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#374151;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-header{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.logo{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-.5px}
.logo-sub{font-size:10px;color:var(--accent2);margin-top:3px;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono)}
nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-group-label{font-size:10px;color:var(--text4);letter-spacing:2px;text-transform:uppercase;
  padding:12px 20px 4px;font-family:var(--mono)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;
  color:var(--text3);font-size:13px;font-weight:400;border-left:2px solid transparent;
  transition:all .15s;background:transparent;border-top:none;border-right:none;border-bottom:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text2)}
.nav-item.active{background:var(--surface3);color:var(--accent);font-weight:600;border-left-color:var(--accent)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;
  padding:1px 7px;font-size:10px;font-weight:700;font-family:var(--mono)}
.sys-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}
.sys-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sys-ver{font-size:10px;color:var(--text4);margin-top:2px;font-family:var(--mono)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px 32px}
.page-title{font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:22px}
.space-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:10px;padding:16px 18px;border:1px solid var(--border)}
.stat-card .accent-bar{width:3px;height:28px;border-radius:2px;display:inline-block;margin-right:10px;vertical-align:middle}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-family:var(--mono)}
.stat-val{font-size:24px;font-weight:700}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 13px;background:#0a0a12;color:var(--accent2);
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--border);font-family:var(--mono)}
td{padding:10px 13px;border-bottom:1px solid #131320;color:var(--text2)}
tr:hover td{background:#0f0f18}

/* BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;
  font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
.badge-green{background:#14532d;color:var(--green)}
.badge-blue{background:#1e3a5f;color:var(--blue)}
.badge-amber{background:#78350f;color:var(--amber)}
.badge-gray{background:#1c1c1c;color:#9ca3af}
.badge-red{background:#7f1d1d;color:#fca5a5}
.badge-orange{background:#431407;color:var(--orange)}
.badge-purple{background:#2e1065;color:var(--accent)}

/* BUTTONS */
.btn{border:none;padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13px;
  font-weight:600;font-family:var(--font);transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent2);color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-amber{background:#d97706;color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:7px 15px}
.btn-sm{padding:4px 10px;font-size:11px}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.form-group{display:flex;flex-direction:column;gap:5px}
label.lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
input,select,textarea{background:#0a0a12;border:1px solid var(--border2);color:var(--text);
  padding:8px 12px;border-radius:7px;font-family:var(--font);font-size:13px;outline:none;
  transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent2)}
select option{background:#0a0a12}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;
  justify-content:center;z-index:100;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:18px}

/* PROGRESS */
.progress{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600}

/* ALERT */
.alert{border-radius:9px;padding:12px 15px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}

/* SEAT MAP */
.seat-row{display:flex;align-items:center;gap:3px;margin-bottom:3px}
.row-lbl{width:16px;font-size:10px;color:var(--text3);flex-shrink:0;font-family:var(--mono)}
.seat{width:20px;height:18px;border-radius:3px;cursor:pointer;transition:transform .1s;border:none}
.seat:hover{transform:scale(1.25)}
.seat.booked{background:#374151;cursor:not-allowed}
.seat.booked:hover{transform:none}

/* CROWD BAR */
.crowd-card{border-left:3px solid var(--border);border-radius:0 8px 8px 0}

/* QR BOX */
.qr-box{background:var(--surface3);border:2px solid var(--accent2);border-radius:9px;
  padding:14px;text-align:center;font-family:var(--mono)}

/* SCROLL */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.tag{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600;border:1px solid}
.mono{font-family:var(--mono)}
.flex{display:flex;align-items:center}
.gap-2{gap:8px}.gap-3{gap:12px}
.justify-between{justify-content:space-between}
.mb-0{margin-bottom:0}.mt-2{margin-top:8px}.mt-3{margin-top:12px}
.text-green{color:var(--green)}.text-red{color:var(--red)}.text-amber{color:var(--amber)}
.text-blue{color:var(--blue)}.text-accent{color:var(--accent)}.text-muted{color:var(--text3)}
.fw-7{font-weight:700}
.hidden{display:none!important}

/* PIPELINE STAGES */
.pipeline{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.pipe-stage{flex:1;text-align:center;padding:14px 8px;cursor:pointer;transition:background .15s;border-right:1px solid var(--border)}
.pipe-stage:last-child{border-right:none}
.pipe-stage:hover{background:var(--surface2)}
.pipe-stage.active-stage{background:rgba(99,102,241,.1)}
.pipe-count{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--text)}
.pipe-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;
  font-size:13px;display:flex;align-items:center;gap:8px;max-width:300px;
  animation:slideUp .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.t-success{border-left:3px solid var(--green)}
.toast.t-error{border-left:3px solid var(--red)}
.toast.t-info{border-left:3px solid var(--accent2)}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SEAT SELECTION TRAY */
.seat-tray{position:sticky;bottom:0;background:var(--surface2);border:1px solid var(--accent2);
  border-radius:10px;padding:12px 18px;margin-top:12px;display:flex;align-items:center;
  justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(99,102,241,.2)}
.seat.selected{outline:2px solid #fff;transform:scale(1.15);z-index:1}
.seat.selected:hover{transform:scale(1.15)}
/* FOOD QTY */
.qty-ctrl{display:flex;align-items:center;gap:0}
.qty-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border2);
  background:var(--surface3);color:var(--text);cursor:pointer;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:background .1s}
.qty-btn:hover{background:var(--accent2);color:#fff}
.qty-num{width:28px;text-align:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}

/* Bar chart mini */
.bar-chart{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;padding:8px 0}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col{width:100%;display:flex;align-items:flex-end;height:80px;background:#0a0a12;border-radius:5px;overflow:hidden;padding:0 6px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height .5s}
.bar-label{font-size:10px;color:var(--text3)}
.bar-pct{font-size:12px;font-weight:700;font-family:var(--mono)}
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">⚡ARENASYNC</div>
    <div class="logo-sub">Stadium Operations DB</div>
  </div>
  <nav id="nav">
    <div class="nav-group-label">Overview</div>
    <button class="nav-item active" data-page="dashboard">🏟&nbsp; Dashboard</button>
    <div class="nav-group-label">Operations</div>
    <button class="nav-item" data-page="events">📅&nbsp; Events</button>
    <button class="nav-item" data-page="seats">💺&nbsp; Seat Bookings</button>
    <button class="nav-item" data-page="parking">🅿&nbsp;&nbsp;Parking</button>
    <button class="nav-item" data-page="food">🍔&nbsp; Food Orders</button>
    <div class="nav-group-label">Monitoring</div>
    <button class="nav-item" data-page="crowd">👥&nbsp; Crowd Flow</button>
    <button class="nav-item" data-page="entry">🚪&nbsp; Entry & QR</button>
    <button class="nav-item" data-page="staff">👷&nbsp; Staff Mgmt</button>
    <button class="nav-item" data-page="incidents">🚨&nbsp; Emergency <span class="nav-badge hidden" id="incBadge">0</span></button>
    <div class="nav-group-label">Analytics</div>
    <button class="nav-item" data-page="reports">📊&nbsp; Reports</button>
  </nav>
</aside>

<!-- MAIN -->
<main class="main" id="main">
  <div id="content"></div>
</main>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const API = 'http://localhost:3000/api';
let currentPage = 'dashboard';

// ── Helpers ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, props={}, ...kids) => {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => k==='class' ? e.className=v : k==='html' ? e.innerHTML=v : e.setAttribute(k,v));
  kids.forEach(k => e.appendChild(typeof k==='string' ? document.createTextNode(k) : k));
  return e;
};
const fmtINR = n => `₹${Number(n||0).toLocaleString('en-IN')}`;
const fmtDate = d => d ? new Date(d).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'}) : '—';

const toast = (msg, type='info') => {
  const t = document.createElement('div');
  t.className = `toast t-${type}`;
  t.innerHTML = `<span>${{success:'✓',error:'✗',info:'ℹ'}[type]||'ℹ'}</span><span>${msg}</span>`;
  $('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 3500);
};

const badge = (s) => {
  const map = {
    upcoming:'badge-blue', ongoing:'badge-green', completed:'badge-gray', cancelled:'badge-gray',
    confirmed:'badge-green', cancelled:'badge-gray', used:'badge-purple',
    booked:'badge-blue', available:'badge-green',
    delivered:'badge-green', preparing:'badge-amber', pending:'badge-gray',
    'on-duty':'badge-green', break:'badge-amber', 'off-duty':'badge-gray',
    active:'badge-red', resolved:'badge-green',
    Low:'badge-green', Medium:'badge-amber', High:'badge-orange', Critical:'badge-red'
  };
  return `<span class="badge ${map[s]||'badge-gray'}">${s}</span>`;
};

const densityColor = {Low:'#22c55e', Medium:'#f59e0b', High:'#f97316', Critical:'#ef4444'};
const sectionColor = {VIP:'#c084fc', Premium:'#60a5fa', Standard:'#4ade80', Economy:'#fbbf24'};

async function api(path, method='GET', body) {
  try {
    const r = await fetch(API+path, {
      method, headers:{'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    // Show error but also unblock the page so navigation still works
    $('content').innerHTML = `<div style="padding:40px;text-align:center;color:var(--red)">
      ⚠ Could not load data — is the server running?<br>
      <span style="font-size:12px;color:var(--text3);margin-top:6px;display:block">${e.message}</span>
      <button class="btn btn-outline" style="margin-top:16px" onclick="pages['${currentPage}']()">Retry</button>
    </div>`;
    return null;
  }
}

// ── Nav ───────────────────────────────────────────────────────
$('nav').addEventListener('click', e => {
  const btn = e.target.closest('[data-page]');
  if (!btn) return;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = btn.dataset.page;
  pages[currentPage]();
});

// ── Render helpers ────────────────────────────────────────────
function statCard(label, val, color) {
  return `<div class="stat-card" style="border-color:${color}33">
    <div class="stat-label"><span class="accent-bar" style="background:${color}"></span>${label}</div>
    <div class="stat-val" style="color:${color}">${val}</div>
  </div>`;
}

function tableHead(...cols) {
  return `<thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>`;
}

function modal(id, title, bodyHtml) {
  return `<div class="modal-bg" id="${id}">
    <div class="modal-card">
      <div class="modal-title">${title}</div>
      ${bodyHtml}
    </div>
  </div>`;
}

function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

function selectOpts(arr, valKey, labelKey, selectedVal='') {
  return arr.map(a => `<option value="${a[valKey]}" ${a[valKey]==selectedVal?'selected':''}>${a[labelKey]}</option>`).join('');
}

// ══════════════════════════════════════════════════════════════
//  PAGE RENDERERS
// ══════════════════════════════════════════════════════════════
const pages = {

// ── DASHBOARD ────────────────────────────────────────────────
async dashboard() {
  $('content').innerHTML = `<div class="text-muted" style="padding:40px;text-align:center">Loading...</div>`;
  const data = await api('/dashboard');
  if (!data) return;
  const s = data.stats;

  const alertHtml = s.active_incidents > 0 ? `
    <div class="alert" style="background:#7f1d1d22;border:1px solid #ef444455;border-radius:9px;margin-bottom:20px">
      <span style="font-size:18px">🚨</span>
      <div>
        <div style="font-weight:700;color:#fca5a5;margin-bottom:2px">Emergency Alert</div>
        <div style="font-size:13px;color:#fca5a5">${s.active_incidents} active incident(s). Check Emergency panel.</div>
      </div>
    </div>` : '';

  const foodPipeMap = {};
  (data.food_pipeline||[]).forEach(f => foodPipeMap[f.status] = f);

  $('content').innerHTML = `
    <div class="page-title">Stadium Operations Dashboard</div>
    <div class="page-sub">Live overview — ArenaMax Stadium & SportsPlex Arena</div>
    ${alertHtml}
    <div class="stat-grid">
      ${statCard('Total Revenue', fmtINR(s.total_revenue), '#a78bfa')}
      ${statCard('Active Bookings', s.confirmed_bookings, '#60a5fa')}
      ${statCard('Checked In', s.checked_in, '#4ade80')}
      ${statCard('Live Events', s.live_events, '#fb923c')}
      ${statCard('Parked Vehicles', s.parked_vehicles, '#f472b6')}
      ${statCard('Food Revenue', fmtINR(s.food_revenue), '#facc15')}
    </div>
    <div class="card-grid-2">
      <div class="card">
        <div class="card-title">🎟 Recent Bookings</div>
        <table>
          ${tableHead('ID','Guest','Event','Amount')}
          <tbody>${(data.recent_bookings||[]).map(b=>`<tr>
            <td><span class="mono text-accent" style="font-size:11px">${b.booking_id}</span></td>
            <td>${b.guest_name}</td>
            <td><span class="text-muted" style="font-size:12px">${b.event_name}</span></td>
            <td class="text-green fw-7">${fmtINR(b.amount)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">👥 Crowd Flow — Live</div>
        ${(data.crowd_flow||[]).map(cf=>`
          <div style="margin-bottom:13px">
            <div class="flex justify-between">
              <span style="font-size:13px;font-weight:600">${cf.gate}</span>
              <span class="chip" style="background:${densityColor[cf.density]}22;color:${densityColor[cf.density]};border:1px solid ${densityColor[cf.density]}44">● ${cf.density}</span>
            </div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${Number(cf.entry_count).toLocaleString()} in / ${Number(cf.exit_count).toLocaleString()} out</div>
            <div class="progress"><div class="progress-fill" style="width:${Math.min((cf.entry_count/15000)*100,100)}%;background:${densityColor[cf.density]}"></div></div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">📅 Upcoming Events</div>
        ${(data.upcoming_events||[]).map(ev=>`
          <div style="padding:9px 0;border-bottom:1px solid var(--border)">
            <div class="flex justify-between">
              <span style="font-weight:600;font-size:13px">${ev.name}</span>
              ${badge(ev.status)}
            </div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px">${ev.event_date} at ${ev.event_time} · ${fmtINR(ev.base_price)}</div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">🍔 Food Orders Pipeline</div>
        ${['pending','preparing','delivered'].map(st=>{
          const f = foodPipeMap[st]||{cnt:0,rev:0};
          const col = {pending:'#6366f1',preparing:'#f59e0b',delivered:'#4ade80'}[st];
          return `<div style="margin-bottom:11px">
            <div class="flex justify-between">
              <span style="font-size:13px">${st.charAt(0).toUpperCase()+st.slice(1)}</span>
              <span style="font-size:13px;font-weight:700;color:${col}">${f.cnt} orders · ${fmtINR(f.rev)}</span>
            </div>
            <div class="progress"><div class="progress-fill" style="width:${f.cnt>0?'100':'0'}%;background:${col}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
},

// ── EVENTS ────────────────────────────────────────────────────
async events() {
  $('content').innerHTML = `<div class="text-muted" style="padding:40px;text-align:center">Loading...</div>`;
  const [events, stadiums] = await Promise.all([api('/events'), api('/stadiums')]);
  if (!events) return;
  $('content').innerHTML = `

let _selectedSeats = []; // [{seat_id, section, price}]

  });

function toggleSeatSelect(seatId, section, price) {
  const el = $('seat_'+seatId);
  const idx = _selectedSeats.findIndex(s=>s.seat_id===seatId);
  if (idx > -1) {
    // deselect
    _selectedSeats.splice(idx, 1);
    el.classList.remove('selected');
    el.style.background = sectionColor[section]+'cc';
  } else {
    // select
    _selectedSeats.push({seat_id:seatId, section, price});
    el.classList.add('selected');
    el.style.background = '#ffffff';
  }
  updateSeatTray();
}

function updateSeatTray() {
  const tray = $('seatTray');
  if (_selectedSeats.length === 0) { tray.style.display='none'; return; }
  tray.style.display = 'flex';
  $('traySeats').textContent = _selectedSeats.map(s=>s.seat_id).join(', ');
  $('trayTotal').textContent = fmtINR(_selectedSeats.reduce((s,x)=>s+x.price,0));
  $('trayCount').textContent = _selectedSeats.length;
}

function clearSeatSelection() {
  _selectedSeats.forEach(s => {
    const el = $('seat_'+s.seat_id);
    if (el) { el.classList.remove('selected'); el.style.background = sectionColor[s.section]+'cc'; }
  });
  _selectedSeats = [];
  updateSeatTray();
}

function openMultiBookingModal() {
  if (_selectedSeats.length === 0) return;
  const total = _selectedSeats.reduce((s,x)=>s+x.price,0);
  $('bmTitle').textContent = `💺 Book ${_selectedSeats.length} Seat(s)`;
  $('bmBody').innerHTML = `
    <div style="background:#0a0a12;border:1px solid var(--border);border-radius:8px;padding:11px 15px;margin-bottom:15px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">SELECTED SEATS</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${_selectedSeats.map(s=>`
          <span style="background:${sectionColor[s.section]}22;color:${sectionColor[s.section]};
            border:1px solid ${sectionColor[s.section]}44;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700">
            ${s.seat_id} · ${fmtINR(s.price)}
          </span>`).join('')}
      </div>
      <div style="border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between">
        <span style="font-size:12px;color:var(--text3)">${_selectedSeats.length} seat(s)</span>
        <span style="font-size:16px;font-weight:700;color:var(--green)">${fmtINR(total)}</span>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px;font-family:var(--mono)">
      ONE BOOKING WILL BE CREATED PER SEAT WITH THE SAME GUEST DETAILS
    </div>
    <div class="form-row">

    </div>

    <div id="bookingProgress" style="display:none;margin-bottom:12px">

      <button class="btn btn-outline" onclick="closeModal('bookingModal')">Cancel</button>

    </div>`;
  openModal('bookingModal');

function openBookingModal(seatId, section, price, eventId) {

async function confirmMultiBooking(eventId) {
  const name = $('bm_name').value, phone = $('bm_phone').value, email = $('bm_email').value;
  if (!name) { toast('Enter guest name','error'); return; }

  const btn = $('confirmBtn');
  btn.disabled = true; btn.textContent = 'Booking...';
  $('bookingProgress').style.display = 'block';

  const seats = [..._selectedSeats];
  let done = 0, failed = 0;
  for (const s of seats) {
    const r = await api('/bookings','POST',{event_id:eventId, seat_id:s.seat_id,
      guest_name:name, phone, email, amount:s.price});
    if (r) done++; else failed++;
    const pct = Math.round(((done+failed)/seats.length)*100);
    $('bookingProgressBar').style.width = pct+'%';
  }

  if (failed === 0) toast(`✓ ${done} booking(s) confirmed!`, 'success');
  else toast(`${done} booked, ${failed} failed`, failed===seats.length?'error':'info');

  closeModal('bookingModal');
  clearSeatSelection();
  await renderSeats(eventId, _currentEvents);
}

async function confirmBooking(seatId, price, eventId) {

  if (r) {
    toast(`Booking confirmed! ${r.booking_id}`,'success');

}

window._cart = {}; // {name: {price, qty}}

function changeQty(name, price, delta) {
  const key = name.replace(/\s+/g,'_');
  const cur = window._cart[name]?.qty || 0;
  const nxt = Math.max(0, cur + delta);
  if (nxt === 0) delete window._cart[name];
  else window._cart[name] = {price, qty: nxt};

  // update display
  const qtyEl = $('qty_'+key);
  const rowEl = $('menu_'+key);
  if (qtyEl) qtyEl.textContent = nxt;
  if (rowEl) {
    rowEl.style.borderColor = nxt > 0 ? 'var(--accent2)' : 'var(--border)';
    rowEl.style.background  = nxt > 0 ? '#1e1e3a' : 'var(--surface2)';
  }
  // update summary
  const entries = Object.entries(window._cart);
  const totalQty = entries.reduce((s,[,v])=>s+v.qty, 0);
  const totalAmt = entries.reduce((s,[,v])=>s+v.price*v.qty, 0);
  $('cartCount').textContent = `${totalQty} item(s) selected`;
  $('cartTotal').textContent = `Total: ${fmtINR(totalAmt)}`;
}

async function placeOrder() {
  const entries = Object.entries(window._cart);
  if (entries.length === 0) { toast('Add at least one item','error'); return; }
  const seatId = $('fo_seat').value.trim();
  if (!seatId) { toast('Enter seat ID','error'); return; }

  // Build flat items array with quantities e.g. ["Biryani x2", "Water x1"]
  const items = entries.map(([name,v]) => v.qty > 1 ? `${name} x${v.qty}` : name);
  const amount = entries.reduce((s,[,v])=>s+v.price*v.qty, 0);

  const r = await api('/food','POST',{
    event_id: $('fo_event').value,
    seat_id:  seatId,
    items,
    amount
  });
  if (r) {
    toast('Order placed!','success');
    closeModal('foodModal');
    window._cart = {};
    pages.food();
  }
}

async function scanQR() {
  const code = $('scanInput').value.trim();
  if (!code) return;
  const r = await api(`/bookings/scan/${encodeURIComponent(code)}`);
  const el = $('scanResult');
  if (!r) {
    el.innerHTML = `<div class="alert" style="background:#7f1d1d22;border:1px solid #ef444455;border-radius:8px">
      <span>❌</span><span style="color:#fca5a5;font-weight:600">Invalid or unrecognized ticket</span></div>`;
    return;
  }
  el.innerHTML = `<div class="alert" style="background:#14532d22;border:1px solid #4ade8055;border-radius:8px">
    <span>✅</span>
    <div style="flex:1">
      <div style="font-weight:700;color:var(--green)">Valid Ticket</div>
      <div style="font-size:13px;color:var(--text2);margin-top:3px">${r.guest_name} · Seat ${r.seat_id} · ${r.event_name}</div>
      ${r.check_in
        ? `<div style="font-size:12px;color:var(--amber);margin-top:4px">Already checked in at ${fmtDate(r.check_in)}</div>`
        : `<button class="btn btn-green btn-sm" style="margin-top:8px" onclick="doCheckIn('${r.booking_id}')">✓ Mark Check-In</button>`}
    </div>
  </div>`;
}
